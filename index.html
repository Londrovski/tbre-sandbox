<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>TBRe AI Team — Role Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --brand:#105BAB; --brand-d:#0c4a8c; --gold:#FFC423;
    --ink:#0a0a0a; --bg:#f4f6f9; --surface:#ffffff; --line:#e5e5e5; --muted:#6b7280;
    --shadow:0 1px 3px rgba(0,0,0,.1), 0 1px 2px -1px rgba(0,0,0,.1);
    --shadow-h:0 6px 18px rgba(16,91,171,.18);
    --d-lead:#0c4a8c; --d-soft:#1f7fce; --d-elec:#e0a100; --d-mech:#6aa9e0; --d-ops:#105BAB; --d-out:#9aa6b5;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.6 Poppins,Arial,Helvetica,sans-serif}
  header{background:#fff;border-bottom:1px solid var(--line);padding:12px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  header img.logo{height:36px;width:auto;display:block}
  header h1{font-size:16px;margin:0;font-weight:700;color:var(--ink)}
  header h1 b{color:var(--brand)}
  header .sub{color:var(--muted);font-size:12.5px}
  .search{margin-left:auto}
  .search input{background:#fff;border:1px solid var(--line);color:var(--ink);padding:8px 12px;border-radius:8px;font:500 13px Poppins,sans-serif;width:220px}
  .search input::placeholder{color:#9aa3af}
  .wrap{display:flex;height:calc(100vh - 61px)}
  .chart{flex:1;overflow:auto;padding:36px 24px 70px;text-align:center}
  .panel{flex:0 0 36%;min-width:380px;border-left:1px solid var(--line);background:var(--surface);overflow:auto;padding:26px 28px}
  .panel.empty{display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center}

  .tree, .tree ul{ list-style:none; margin:0; padding:0; display:flex; }
  .tree{ justify-content:center; }
  .tree ul{ padding-top:24px; justify-content:center; }
  .tree li{ position:relative; padding:24px 10px 0; display:flex; flex-direction:column; align-items:center; }
  .tree li::before, .tree li::after{ content:''; position:absolute; top:0; width:50%; height:24px; border-top:2px solid var(--line); }
  .tree li::before{ right:50%; }
  .tree li::after{ left:50%; border-left:2px solid var(--line); }
  .tree li:only-child::before, .tree li:only-child::after{ display:none; }
  .tree li:only-child{ padding-top:24px; }
  .tree li:first-child::before, .tree li:last-child::after{ border:0 none; }
  .tree li:last-child::before{ border-right:2px solid var(--line); border-radius:0 7px 0 0; }
  .tree li:first-child::after{ border-radius:7px 0 0 0; }
  .tree ul::before{ content:''; position:absolute; top:0; left:50%; border-left:2px solid var(--line); width:0; height:24px; }
  .tree li>ul{ position:relative; }

  .blk{ position:relative; background:var(--surface); border:1px solid var(--line);
    border-top:3px solid var(--c,var(--brand)); border-radius:8px; padding:10px 13px;
    min-width:150px; max-width:184px; cursor:pointer; transition:.14s; text-align:left; box-shadow:var(--shadow); }
  .blk:hover{ transform:translateY(-2px); box-shadow:var(--shadow-h); }
  .blk.sel{ box-shadow:0 0 0 3px var(--gold), var(--shadow); }
  @keyframes openGlow{ 0%,100%{ box-shadow:0 0 0 1px var(--gold), 0 0 5px rgba(255,196,35,.30), var(--shadow);} 50%{ box-shadow:0 0 0 1px var(--gold), 0 0 14px rgba(255,196,35,.65), var(--shadow);} }
  .blk.open{ border-color:var(--gold); animation:openGlow 2.6s ease-in-out infinite; }
  .blk.open:hover{ animation:none; }
  .blk.open.sel{ animation:none; box-shadow:0 0 0 3px var(--gold), var(--shadow); }
  .blk .nm{ font-size:13.5px; font-weight:700; line-height:1.25; }
  .blk .mt{ font-size:11px; color:var(--muted); margin-top:4px; display:flex; gap:6px; align-items:center; font-weight:500; }
  .odot{ width:7px; height:7px; border-radius:50%; display:inline-block; flex:none; }
  .odot.open{ background:var(--gold); } .odot.filled{ background:var(--brand); }

  .legend{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin:0 0 12px; font-size:11.5px; color:var(--muted); font-weight:500; }
  .legend span{ display:flex; align-items:center; gap:5px; }
  .sw{ width:10px;height:10px;border-radius:3px;display:inline-block; }
  .hint{ color:var(--muted); font-size:12px; margin:22px 0 0; }
  .spare-wrap{ margin:48px auto 0; padding-top:26px; border-top:1px dashed var(--line); max-width:840px; }
  .spare-label{ font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; font-weight:600; }
  .loading{ color:var(--muted); padding:60px 0; }

  .phead{ display:flex; gap:20px; align-items:stretch; }
  .phead .ptext{ flex:1; min-width:0; display:flex; flex-direction:column; }
  .pphoto{ flex:0 0 40%; display:flex; }
  .pphoto img, .pphoto .ph{ width:100%; border-radius:14px; }
  .pphoto img{ height:100%; object-fit:cover; border:1px solid var(--line); }
  .pphoto .ph{ min-height:210px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:34px; color:#fff; }
  .panel h2{ margin:0 0 6px; font-size:22px; font-weight:700; color:var(--ink); line-height:1.2; }
  .panel .pdomain{ display:inline-block; background:var(--c,var(--brand)); color:#fff; font-size:10.5px; font-weight:600;
    text-transform:uppercase; letter-spacing:.05em; padding:3px 10px; border-radius:20px; margin-bottom:14px; }
  .panel .sect{ font-size:13px; letter-spacing:.04em; text-transform:uppercase; color:var(--brand); font-weight:700; margin:26px 0 12px; border-bottom:1px solid var(--line); padding-bottom:7px; }
  .panel p.purpose{ color:#374151; margin:14px 0 0; font-size:15px; }
  .kv{ display:flex; gap:8px; font-size:14px; margin:5px 0; }
  .kv b{ color:var(--muted); font-weight:500; min-width:96px; }

  details.resp{ background:var(--surface); border:1px solid var(--line); border-left:3px solid var(--c,var(--brand));
    border-radius:8px; margin:9px 0; overflow:hidden; box-shadow:var(--shadow); }
  details.resp>summary{ cursor:pointer; list-style:none; padding:13px 16px; font-size:16px; font-weight:700;
    display:flex; align-items:center; gap:10px; color:var(--ink); }
  details.resp>summary::-webkit-details-marker{ display:none; }
  details.resp>summary::before{ content:'+'; color:var(--brand); font-weight:800; font-size:18px; width:14px; }
  details.resp[open]>summary::before{ content:'–'; }
  .resp-body{ padding:2px 16px 15px 16px; display:flex; flex-wrap:wrap; gap:4px 22px; }
  .rg{ flex:1; min-width:150px; margin:10px 0 0; }
  .rl{ display:block; font-size:12px; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); font-weight:700; margin-bottom:6px; }
  .rg.owns .rl{ color:var(--brand); } .rg.delivers .rl{ color:#b07d00; }
  .rlist{ margin:3px 0 0; padding-left:18px; } .rlist li{ font-size:15px; color:#374151; margin:4px 0; }
  .rtbd{ color:var(--muted); font-size:12px; margin:2px 0 0; font-style:italic; }
  details.ctx{ margin:24px 0 12px; }
  details.ctx>summary{ cursor:pointer; list-style:none; font-size:13px; letter-spacing:.04em; text-transform:uppercase; color:var(--brand); font-weight:700; border-bottom:1px solid var(--line); padding-bottom:7px; display:flex; align-items:center; }
  details.ctx>summary::-webkit-details-marker{ display:none; }
  details.ctx>summary::after{ content:'+'; margin-left:auto; color:var(--muted); font-weight:800; font-size:16px; }
  details.ctx[open]>summary::after{ content:'–'; }
  details.ctx .ilist{ margin-top:10px; }
  .ilist{ margin:0; padding-left:18px; } .ilist li{ margin:5px 0; font-size:15px; color:#374151; }

  .tov-h{ font-size:22px; font-weight:700; color:var(--ink); margin:0 0 4px; }
  .tov-p{ color:#374151; font-size:15px; margin:10px 0; }
  .back{ display:inline-block; font-size:12.5px; color:var(--muted); text-decoration:none; margin-bottom:14px; font-weight:600; }
  .back:hover{ color:var(--brand); }
  .apply{ margin-top:26px; display:block; text-align:center; background:var(--gold); color:#3a2c00; padding:12px; border-radius:8px; text-decoration:none; font-weight:700; font-size:13.5px; }
  .apply:hover{ filter:brightness(1.04); }
  .filebadge{ font-size:11px; color:var(--muted); margin-top:16px; }
  .row{ display:flex; flex-wrap:wrap; gap:14px; justify-content:center; }
</style>
</head>
<body>
<header>
  <img class="logo" src="https://www.teambathracingelectric.com/tbre_logo_colour.png" alt="TBRe">
  <h1>AI Team <b>·</b> Org Chart</h1>
  <span class="sub">click a role for details</span>
  <span class="search"><input id="q" placeholder="Search roles…" oninput="render()"/></span>
</header>
<div class="wrap">
  <div class="chart" id="chart"><div class="loading">Loading roles…</div></div>
  <div class="panel empty" id="panel">Select a role to view its responsibilities and context.</div>
</div>
<script>
var REPO="Londrovski/tbre-sandbox", DIR="seats", BRANCH="main";
var NL=String.fromCharCode(10);
var SEATS=[], byId={}, selected=null, TEAM='';
function childrenOf(id){ return SEATS.filter(function(s){return s.reports_to===id;}); }

var DCOL={ "Leadership":"var(--d-lead)","Technology – Software":"var(--d-soft)",
  "Technology – Electrical":"var(--d-elec)","Technology – Mechanical":"var(--d-mech)",
  "Operations":"var(--d-ops)","Outside AI (interface)":"var(--d-out)" };
var DORD={ "Leadership":0,"Technology – Software":1,"Technology – Electrical":2,"Technology – Mechanical":3,"Operations":4,"Outside AI (interface)":5 };
function colorOf(s){ return DCOL[s.domain]||"var(--brand)"; }
function esc(t){ return (t==null?'':''+t).replace(/[<>&]/g,function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;'}[c];}); }
function inline(t){ var p=t.split('**'),r=''; for(var i=0;i<p.length;i++){ r+=(i%2===1)?'<strong>'+p[i]+'</strong>':p[i]; } return r; }
function initials(n){ var p=(n||'').split(' ').filter(Boolean); return ((p[0]||'?').charAt(0)+(p.length>1?p[p.length-1].charAt(0):'')).toUpperCase(); }
function uniq(a){ var seen={},o=[]; a.forEach(function(x){ if(!seen[x]){ seen[x]=1; o.push(x); } }); return o; }
function mdToHtml(md){
  var out=[], inList=false; function cl(){ if(inList){ out.push('</ul>'); inList=false; } }
  md.split(NL).forEach(function(raw){
    var line=raw.replace(/ +$/,'');
    if(line.charAt(0)==='#'){ cl(); var lv=0; while(line.charAt(lv)==='#') lv++; var t=line.slice(lv).trim();
      out.push(lv<=1 ? '<h2 class="tov-h">'+inline(esc(t))+'</h2>' : '<div class="sect">'+inline(esc(t))+'</div>'); }
    else if((line.charAt(0)==='-'||line.charAt(0)==='*') && line.charAt(1)===' '){ if(!inList){ out.push('<ul class="ilist">'); inList=true; } out.push('<li>'+inline(esc(line.slice(2)))+'</li>'); }
    else if(line===''){ cl(); }
    else { cl(); out.push('<p class="tov-p">'+inline(esc(line))+'</p>'); }
  });
  cl(); return out.join('');
}
function showTeam(){ selected=null; var p=document.getElementById('panel'); p.className='panel';
  p.innerHTML = TEAM ? mdToHtml(TEAM) : '<div class="loading">Add a team.md for the overview.</div>'; render(); }
function trimSep(s){ var k=0; while(k<s.length && ' —:-'.indexOf(s.charAt(k))>=0) k++; return s.slice(k); }

function parseResp(lines){
  var res=[], cur=null;
  lines.forEach(function(raw){
    var t=raw.replace(/^ +/,''); var indent=raw.length-t.length;
    if(t.slice(0,2)!=='- ') return;
    var b=t.slice(2);
    if(indent===0){
      var title=b, desc='', a=b.indexOf('**');
      if(a>=0){ var e=b.indexOf('**',a+2); if(e>a){ title=b.slice(a+2,e); desc=trimSep(b.slice(e+2)); } }
      cur={title:title, desc:desc, context:[], owns:[], delivers:[]};
      res.push(cur);
    } else if(cur){
      var ci=b.indexOf(':');
      if(ci>0){ var key=b.slice(0,ci).trim().toLowerCase(); var val=b.slice(ci+1).trim();
        if(cur[key] && cur[key].push) cur[key].push(val); }
    }
  });
  return res;
}

function parseCard(md){
  var fm={}, body=md;
  if(md.indexOf('---')===0){
    var end=md.indexOf(NL+'---',3);
    if(end>0){
      md.slice(3,end).trim().split(NL).forEach(function(line){
        var i=line.indexOf(':'); if(i<0) return;
        fm[line.slice(0,i).trim()]=(line.slice(i+1).trim()||null);
      });
      body=md.slice(end+4).trimStart();
    }
  }
  var sec={}, cur='_intro'; sec[cur]=[];
  body.split(NL).forEach(function(raw){
    var line=raw.replace(/ +$/,'');
    if(line.slice(0,2)==='##'){ cur=line.replace(/^#+/,'').trim().toLowerCase(); sec[cur]=[]; }
    else if(line.charAt(0)==='#'){ /* title */ }
    else sec[cur].push(line);
  });
  function items(name){ return (sec[name]||[]).filter(function(l){return l.slice(0,2)==='- ';}).map(function(l){return l.slice(2);}); }
  return {
    id:fm.id, seat:fm.seat||fm.id, domain:fm.domain||'', owner:fm.owner||'TBD', tag:fm.tag||null, course:fm.course||null, photo:fm.photo||null,
    reports_to:fm.reports_to||null, hrs:fm.hrs||'?', group:fm.group||null,
    purpose:(sec['_intro']||[]).join(' ').trim(),
    resp:parseResp(sec['responsibilities']||[]),
    interfaces:items('key interfaces'),
    requirements:items('requirements')
  };
}

function block(s){
  var open=!s.owner||s.owner==='TBD';
  var cls='blk'+(open?' open':'')+(selected===s.id?' sel':'');
  return '<div class="'+cls+'" data-id="'+esc(s.id)+'" style="--c:'+colorOf(s)+'">'
    +'<div class="nm">'+esc(s.seat)+'</div>'
    +'<div class="mt"><span class="odot '+(open?'open':'filled')+'"></span>'+(open?'Open':esc(s.owner))+' · ~'+esc(s.hrs)+'h</div></div>';
}
function treeNode(id){
  var kids=childrenOf(id).sort(function(a,b){ var da=(DORD[a.domain]==null?9:DORD[a.domain]), db=(DORD[b.domain]==null?9:DORD[b.domain]); return da-db || a.seat.localeCompare(b.seat); });
  var h='<li>'+block(byId[id]);
  if(kids.length) h+='<ul>'+kids.map(function(k){return treeNode(k.id);}).join('')+'</ul>';
  return h+'</li>';
}
function legend(){
  return '<div class="legend">'+Object.keys(DCOL).map(function(d){
    return '<span><span class="sw" style="background:'+DCOL[d]+'"></span>'+d.replace('Technology – ','').replace(' (interface)','')+'</span>';
  }).join('')+'</div>';
}
function ulist(arr){ return arr.length? '<ul class="ilist">'+arr.map(function(x){return '<li>'+inline(esc(x))+'</li>';}).join('')+'</ul>' : '<p class="rtbd">TBD</p>'; }
function grp(cls,label,arr){
  var body = arr.length ? '<ul class="rlist">'+arr.map(function(x){return '<li>'+inline(esc(x))+'</li>';}).join('')+'</ul>'
                        : '<p class="rtbd">TBD</p>';
  return '<div class="rg '+cls+'"><span class="rl">'+label+'</span>'+body+'</div>';
}

function select(id){
  selected=id; var s=byId[id]; if(!s) return;
  var p=document.getElementById('panel'); p.className='panel';
  var rep=s.reports_to&&byId[s.reports_to]?byId[s.reports_to].seat:'—';
  var open=!s.owner||s.owner==='TBD';
  var who = open ? '<span style="color:#b8860b;font-weight:600">Open · recruiting</span>'
                 : esc(s.owner)+(s.tag?' · <span style="color:var(--muted)">'+esc(s.tag)+'</span>':'');
  var photo = s.photo
    ? '<img src="'+esc(s.photo)+'" alt="'+esc(s.owner)+'">'
    : '<div class="ph" style="background:'+(open?'var(--gold)':colorOf(s))+';color:'+(open?'#3a2c00':'#fff')+'">'+(open?'?':esc(initials(s.owner)))+'</div>';
  var ctx=[];
  s.resp.forEach(function(r){ ctx=ctx.concat(r.context); });
  ctx=uniq(ctx);
  var resp=s.resp.map(function(r){
    var inner=grp('owns','Owns',r.owns)+grp('delivers','Delivers',r.delivers);
    return '<details class="resp" open style="--c:'+colorOf(s)+'"><summary>'+esc(r.title)+'</summary><div class="resp-body">'+inner+'</div></details>';
  }).join('');
  var pur=s.purpose||''; if(pur.length>250){ var cut=pur.slice(0,250); var sp=cut.lastIndexOf(' '); if(sp>200){ cut=cut.slice(0,sp); } pur=cut+'…'; }
  p.innerHTML=
    '<a class="back" href="#" onclick="showTeam();return false;">‹ Team overview</a>'
    +'<div class="phead"><div class="ptext">'
    +'<h2>'+esc(s.seat)+'</h2>'
    +'<div class="pdomain" style="--c:'+colorOf(s)+'">'+esc(s.domain)+'</div>'
    +'<div class="kv"><b>Owner</b><span>'+who+'</span></div>'
    +(s.course?'<div class="kv"><b>Course</b><span>'+esc(s.course)+'</span></div>':'')
    +'<div class="kv"><b>Reports to</b><span>'+esc(rep)+'</span></div>'
    +'<div class="kv"><b>Commitment</b><span>~'+esc(s.hrs)+' hrs/week</span></div>'
    +(pur?'<p class="purpose">'+inline(esc(pur))+'</p>':'')
    +'</div><div class="pphoto">'+photo+'</div></div>'
    +'<div class="sect">Requirements</div>'+ulist(s.requirements)
    +'<div class="sect">Responsibilities</div>'+(resp||'<p class="rtbd">TBD</p>')
    +(ctx.length?'<details class="ctx"><summary>Context</summary>'+ulist(ctx)+'</details>':'')
    +'<div class="sect">Key interfaces</div>'+ulist(s.interfaces)
    +(open?'<a class="apply" href="#" onclick="return false;">Apply for this seat</a>':'')
    +'<div class="filebadge">seats/'+esc(s.id)+'.md</div>';
  render();
}
function render(){
  var q=(document.getElementById('q').value||'').toLowerCase();
  var chart=document.getElementById('chart');
  if(q){
    var hits=SEATS.filter(function(s){return ((s.seat||'')+(s.domain||'')+(s.owner||'')+(s.purpose||'')).toLowerCase().indexOf(q)>=0;});
    chart.innerHTML='<div class="row">'+hits.map(block).join('')+'</div>'; return;
  }
  var roots=SEATS.filter(function(s){return !s.reports_to && s.group!=='spare';});
  var spares=SEATS.filter(function(s){return s.group==='spare';});
  var html=legend()+'<ul class="tree">'+roots.map(function(r){return treeNode(r.id);}).join('')+'</ul>';
  if(spares.length){
    html+='<div class="spare-wrap"><div class="spare-label">Outside the AI team (spare)</div><div class="row">'+spares.map(block).join('')+'</div></div>';
  }
  html+='<p class="hint">Add a card: drop a markdown file with key info at the top into /seats — it shows up here automatically.</p>';
  chart.innerHTML=html;
}
document.getElementById('chart').addEventListener('click',function(e){ var b=e.target.closest('.blk'); if(b) select(b.getAttribute('data-id')); });

function load(){
  Promise.all([
    fetch('https://raw.githubusercontent.com/'+REPO+'/'+BRANCH+'/team.md').then(function(r){ return r.ok?r.text():''; }).catch(function(){ return ''; }),
    fetch('https://api.github.com/repos/'+REPO+'/contents/'+DIR+'?ref='+BRANCH)
      .then(function(r){ if(!r.ok) throw new Error('list '+r.status); return r.json(); })
      .then(function(items){ var files=items.filter(function(i){return i.type==='file' && i.name.slice(-3)==='.md';});
        return Promise.all(files.map(function(f){ return fetch(f.download_url).then(function(r){return r.text();}); })); })
  ]).then(function(out){
    TEAM=out[0]||'';
    SEATS=out[1].map(parseCard).filter(function(s){return s.id;});
    byId={}; SEATS.forEach(function(s){ byId[s.id]=s; });
    render(); showTeam();
  }).catch(function(e){
    document.getElementById('chart').innerHTML="<p class='loading'>Couldn't load ("+esc(e.message)+"). Reads /seats live via the GitHub API — if rate-limited, wait a minute and reload.</p>";
  });
}
load();
</script>
</body>
</html>
