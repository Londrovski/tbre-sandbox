<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>TBRe AI Team — Role Map</title>
<style>
  :root{
    --brand:#105BAB; --brand-d:#0c4a8c; --gold:#FFC423;
    --ink:#0f1722; --bg:#eef2f7; --surface:#ffffff; --line:#d4dbe6; --muted:#5b6675;
    --d-lead:#105BAB; --d-soft:#1f7fce; --d-elec:#d99100; --d-mech:#7a52cc; --d-ops:#1f9d6b; --d-out:#64748b;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  header{background:var(--brand);color:#fff;padding:16px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  header h1{font-size:18px;margin:0;font-weight:800;letter-spacing:.2px}
  header h1 b{color:var(--gold)}
  header .sub{color:#cfe0f3;font-size:13px}
  .search{margin-left:auto}
  .search input{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.3);color:#fff;padding:7px 11px;border-radius:8px;font-size:13px;width:210px}
  .search input::placeholder{color:#d6e4f5}
  .wrap{display:flex;height:calc(100vh - 58px)}
  .chart{flex:1;overflow:auto;padding:34px 24px 70px;text-align:center}
  .panel{flex:0 0 34%;min-width:360px;border-left:1px solid var(--line);background:var(--surface);overflow:auto;padding:26px 28px}
  .panel.empty{display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center}

  .tree, .tree ul{ list-style:none; margin:0; padding:0; display:flex; }
  .tree{ justify-content:center; }
  .tree ul{ padding-top:22px; justify-content:center; }
  .tree li{ position:relative; padding:22px 10px 0; display:flex; flex-direction:column; align-items:center; }
  .tree li::before, .tree li::after{ content:''; position:absolute; top:0; width:50%; height:22px; border-top:2px solid var(--line); }
  .tree li::before{ right:50%; }
  .tree li::after{ left:50%; border-left:2px solid var(--line); }
  .tree li:only-child::before, .tree li:only-child::after{ display:none; }
  .tree li:only-child{ padding-top:22px; }
  .tree li:first-child::before, .tree li:last-child::after{ border:0 none; }
  .tree li:last-child::before{ border-right:2px solid var(--line); border-radius:0 6px 0 0; }
  .tree li:first-child::after{ border-radius:6px 0 0 0; }
  .tree ul::before{ content:''; position:absolute; top:0; left:50%; border-left:2px solid var(--line); width:0; height:22px; }
  .tree li>ul{ position:relative; }

  .blk{ position:relative; background:var(--surface); border:1px solid var(--line);
    border-top:3px solid var(--c,var(--brand)); border-radius:10px; padding:9px 12px;
    min-width:144px; max-width:178px; cursor:pointer; transition:.12s; text-align:left;
    box-shadow:0 1px 2px rgba(15,23,34,.06); }
  .blk:hover{ transform:translateY(-2px); box-shadow:0 4px 12px rgba(16,91,171,.16); border-color:var(--c,var(--brand)); }
  .blk.sel{ box-shadow:0 0 0 3px var(--gold); }
  @keyframes openGlow{ 0%,100%{ box-shadow:0 0 0 1px var(--gold), 0 0 5px rgba(255,196,35,.30);} 50%{ box-shadow:0 0 0 1px var(--gold), 0 0 13px rgba(255,196,35,.6);} }
  .blk.open{ border-color:var(--gold); animation:openGlow 2.6s ease-in-out infinite; }
  .blk.open:hover{ animation:none; }
  .blk.open.sel{ animation:none; box-shadow:0 0 0 3px var(--gold); }
  .blk .nm{ font-size:13px; font-weight:700; line-height:1.25; }
  .blk .mt{ font-size:11px; color:var(--muted); margin-top:3px; display:flex; gap:6px; align-items:center; }
  .odot{ width:7px; height:7px; border-radius:50%; display:inline-block; flex:none; }
  .odot.open{ background:var(--gold); } .odot.filled{ background:var(--d-ops); }

  .legend{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin:0 0 10px; font-size:11px; color:var(--muted); }
  .legend span{ display:flex; align-items:center; gap:5px; }
  .sw{ width:10px;height:10px;border-radius:3px;display:inline-block; }
  .hint{ color:var(--muted); font-size:12px; margin:20px 0 0; }
  .spare-wrap{ margin:46px auto 0; padding-top:24px; border-top:1px dashed var(--line); max-width:820px; }
  .spare-label{ font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
  .loading{ color:var(--muted); padding:60px 0; }

  .panel h2{margin:0 0 2px;font-size:20px;color:var(--brand)}
  .panel .pdomain{display:inline-block;background:var(--c,var(--brand));color:#fff;font-size:11px;
    text-transform:uppercase;letter-spacing:.05em;padding:2px 9px;border-radius:20px;margin-bottom:14px}
  .panel .sect{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--brand);font-weight:700;margin:22px 0 8px;border-bottom:1px solid var(--line);padding-bottom:5px}
  .panel p.purpose{color:#33414f;margin:6px 0 0}
  .kv{display:flex;gap:8px;font-size:13px;margin:3px 0}
  .kv b{color:var(--muted);font-weight:500;min-width:96px}

  details.resp{ background:#f7f9fc; border:1px solid var(--line); border-left:3px solid var(--c,var(--brand));
    border-radius:8px; margin:7px 0; overflow:hidden; }
  details.resp>summary{ cursor:pointer; list-style:none; padding:9px 12px; font-size:13px; font-weight:600;
    display:flex; align-items:center; gap:8px; }
  details.resp>summary::-webkit-details-marker{ display:none; }
  details.resp>summary::before{ content:'+'; color:var(--brand); font-weight:800; width:12px; }
  details.resp[open]>summary::before{ content:'–'; }
  .resp-body{ padding:2px 12px 12px 12px; }
  .resp-d{ font-size:13px; color:#33414f; margin:2px 0 10px; }
  .rg{ margin:8px 0; }
  .rl{ display:block; font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); font-weight:700; margin-bottom:4px; }
  .rg.owns .rl{ color:var(--brand); } .rg.delivers .rl{ color:var(--d-ops); }
  .chips{ display:flex; flex-wrap:wrap; gap:6px; }
  .chip{ font-size:12px; padding:5px 9px; border-radius:7px; background:#eef2f8; border:1px solid var(--line); color:#33414f; }
  .chip.tbd{ background:#fff; border-style:dashed; color:var(--muted); }
  .rlist{ margin:2px 0 0; padding-left:16px; } .rlist li{ font-size:12.5px; color:#33414f; margin:2px 0; }
  .rtbd{ color:var(--muted); font-size:12px; margin:2px 0 0; }
  .ilist{ margin:0; padding-left:18px; } .ilist li{ margin:3px 0; font-size:13px; color:#33414f; }

  .apply{margin-top:24px;display:block;text-align:center;background:var(--brand);color:#fff;padding:11px;border-radius:8px;text-decoration:none;font-weight:700}
  .apply:hover{background:var(--brand-d)}
  .filebadge{font-size:11px;color:var(--muted);margin-top:16px}
  .row{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
</style>
</head>
<body>
<header>
  <h1>TBRe <b>AI</b> Team</h1>
  <span class="sub">Org chart · auto-built from /seats · click a role for details</span>
  <span class="search"><input id="q" placeholder="Search roles…" oninput="render()"/></span>
</header>
<div class="wrap">
  <div class="chart" id="chart"><div class="loading">Loading roles…</div></div>
  <div class="panel empty" id="panel">Select a role to view its responsibilities and context.</div>
</div>
<script>
var REPO="Londrovski/tbre-sandbox", DIR="seats", BRANCH="main";
var NL=String.fromCharCode(10);
var SEATS=[], byId={}, selected=null;
function childrenOf(id){ return SEATS.filter(function(s){return s.reports_to===id;}); }

var DCOL={ "Leadership":"var(--d-lead)","Technology – Software":"var(--d-soft)",
  "Technology – Electrical":"var(--d-elec)","Technology – Mechanical":"var(--d-mech)",
  "Operations":"var(--d-ops)","Outside AI (interface)":"var(--d-out)" };
function colorOf(s){ return DCOL[s.domain]||"var(--brand)"; }
function esc(t){ return (t==null?'':''+t).replace(/[<>&]/g,function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;'}[c];}); }
function inline(t){ var p=t.split('**'),r=''; for(var i=0;i<p.length;i++){ r+=(i%2===1)?'<strong>'+p[i]+'</strong>':p[i]; } return r; }
function trimSep(s){ var k=0; while(k<s.length && ' —:-'.indexOf(s.charAt(k))>=0) k++; return s.slice(k); }

function parseResp(lines){
  var res=[], cur=null;
  lines.forEach(function(raw){
    var t=raw.replace(/^ +/,''); var indent=raw.length-t.length;
    if(t.slice(0,2)!=='- ') return;
    var b=t.slice(2);
    if(indent===0){
      var title=b, desc='', a=b.indexOf('**');
      if(a>=0){ var e=b.indexOf('**',a+2); if(e>a){ title=b.slice(a+2,e); desc=trimSep(b.slice(e+2)); } }
      cur={title:title, desc:desc, context:[], owns:[], delivers:[]};
      res.push(cur);
    } else if(cur){
      var ci=b.indexOf(':');
      if(ci>0){ var key=b.slice(0,ci).trim().toLowerCase(); var val=b.slice(ci+1).trim();
        if(cur[key] && cur[key].push) cur[key].push(val); }
    }
  });
  return res;
}

function parseCard(md){
  var fm={}, body=md;
  if(md.indexOf('---')===0){
    var end=md.indexOf(NL+'---',3);
    if(end>0){
      md.slice(3,end).trim().split(NL).forEach(function(line){
        var i=line.indexOf(':'); if(i<0) return;
        fm[line.slice(0,i).trim()]=(line.slice(i+1).trim()||null);
      });
      body=md.slice(end+4).trimStart();
    }
  }
  var sec={}, cur='_intro'; sec[cur]=[];
  body.split(NL).forEach(function(raw){
    var line=raw.replace(/ +$/,'');
    if(line.slice(0,2)==='##'){ cur=line.replace(/^#+/,'').trim().toLowerCase(); sec[cur]=[]; }
    else if(line.charAt(0)==='#'){ /* title */ }
    else sec[cur].push(line);
  });
  function items(name){ return (sec[name]||[]).filter(function(l){return l.slice(0,2)==='- ';}).map(function(l){return l.slice(2);}); }
  return {
    id:fm.id, seat:fm.seat||fm.id, domain:fm.domain||'', owner:fm.owner||'TBD', tag:fm.tag||null,
    reports_to:fm.reports_to||null, hrs:fm.hrs||'?', group:fm.group||null,
    purpose:(sec['_intro']||[]).join(' ').trim(),
    resp:parseResp(sec['responsibilities']||[]),
    interfaces:items('key interfaces'),
    requirements:items('requirements')
  };
}

function block(s){
  var open=!s.owner||s.owner==='TBD';
  var cls='blk'+(open?' open':'')+(selected===s.id?' sel':'');
  return '<div class="'+cls+'" data-id="'+esc(s.id)+'" style="--c:'+colorOf(s)+'">'
    +'<div class="nm">'+esc(s.seat)+'</div>'
    +'<div class="mt"><span class="odot '+(open?'open':'filled')+'"></span>'+(open?'Open':esc(s.owner))+' · ~'+esc(s.hrs)+'h</div></div>';
}
function treeNode(id){
  var kids=childrenOf(id).sort(function(a,b){return a.seat.localeCompare(b.seat);});
  var h='<li>'+block(byId[id]);
  if(kids.length) h+='<ul>'+kids.map(function(k){return treeNode(k.id);}).join('')+'</ul>';
  return h+'</li>';
}
function legend(){
  return '<div class="legend">'+Object.keys(DCOL).map(function(d){
    return '<span><span class="sw" style="background:'+DCOL[d]+'"></span>'+d.replace('Technology – ','').replace(' (interface)','')+'</span>';
  }).join('')+'</div>';
}
function ulist(arr){ return arr.length? '<ul class="ilist">'+arr.map(function(x){return '<li>'+inline(esc(x))+'</li>';}).join('')+'</ul>' : '<p style="color:var(--muted);font-size:13px">TBD</p>'; }
function grp(cls,label,arr){
  var body = arr.length ? '<ul class="rlist">'+arr.map(function(x){return '<li>'+inline(esc(x))+'</li>';}).join('')+'</ul>'
                        : '<p class="rtbd">TBD</p>';
  return '<div class="rg '+cls+'"><span class="rl">'+label+'</span>'+body+'</div>';
}

function select(id){
  selected=id; var s=byId[id]; if(!s) return;
  var p=document.getElementById('panel'); p.className='panel';
  var rep=s.reports_to&&byId[s.reports_to]?byId[s.reports_to].seat:'—';
  var open=!s.owner||s.owner==='TBD';
  var who = open ? '<span style="color:#b8860b;font-weight:600">Open · recruiting</span>'
                 : esc(s.owner)+(s.tag?' · <span style="color:var(--muted)">'+esc(s.tag)+'</span>':'');
  var resp=s.resp.map(function(r){
    var inner=(r.desc?'<p class="resp-d">'+inline(esc(r.desc))+'</p>':'')
      + grp('context','Context',r.context) + grp('owns','Owns',r.owns) + grp('delivers','Delivers',r.delivers);
    return '<details class="resp" style="--c:'+colorOf(s)+'"><summary>'+esc(r.title)+'</summary><div class="resp-body">'+inner+'</div></details>';
  }).join('');
  p.innerHTML=
    '<h2>'+esc(s.seat)+'</h2>'
    +'<div class="pdomain" style="--c:'+colorOf(s)+'">'+esc(s.domain)+'</div>'
    +'<div class="kv"><b>Owner</b><span>'+who+'</span></div>'
    +'<div class="kv"><b>Reports to</b><span>'+esc(rep)+'</span></div>'
    +'<div class="kv"><b>Commitment</b><span>~'+esc(s.hrs)+' hrs/week</span></div>'
    +(s.purpose?'<p class="purpose">'+inline(esc(s.purpose))+'</p>':'')
    +'<div class="sect">Responsibilities</div>'+(resp||'<p style="color:var(--muted);font-size:13px">TBD</p>')
    +'<div class="sect">Key interfaces</div>'+ulist(s.interfaces)
    +'<div class="sect">Requirements</div>'+ulist(s.requirements)
    +(open?'<a class="apply" href="#" onclick="return false;">Apply for this seat</a>':'')
    +'<div class="filebadge">seats/'+esc(s.id)+'.md</div>';
  render();
}
function render(){
  var q=(document.getElementById('q').value||'').toLowerCase();
  var chart=document.getElementById('chart');
  if(q){
    var hits=SEATS.filter(function(s){return ((s.seat||'')+(s.domain||'')+(s.owner||'')+(s.purpose||'')).toLowerCase().indexOf(q)>=0;});
    chart.innerHTML='<div class="row">'+hits.map(block).join('')+'</div>'; return;
  }
  var roots=SEATS.filter(function(s){return !s.reports_to && s.group!=='spare';});
  var spares=SEATS.filter(function(s){return s.group==='spare';});
  var html=legend()+'<ul class="tree">'+roots.map(function(r){return treeNode(r.id);}).join('')+'</ul>';
  if(spares.length){
    html+='<div class="spare-wrap"><div class="spare-label">Outside the AI team (spare)</div><div class="row">'+spares.map(block).join('')+'</div></div>';
  }
  html+='<p class="hint">Add a card: drop a markdown file with key info at the top into /seats — it shows up here automatically.</p>';
  chart.innerHTML=html;
}
document.getElementById('chart').addEventListener('click',function(e){ var b=e.target.closest('.blk'); if(b) select(b.getAttribute('data-id')); });

function load(){
  fetch('https://api.github.com/repos/'+REPO+'/contents/'+DIR+'?ref='+BRANCH)
   .then(function(r){ if(!r.ok) throw new Error('list '+r.status); return r.json(); })
   .then(function(items){
     var files=items.filter(function(i){return i.type==='file' && i.name.slice(-3)==='.md';});
     return Promise.all(files.map(function(f){ return fetch(f.download_url).then(function(r){return r.text();}); }));
   })
   .then(function(cards){
     SEATS=cards.map(parseCard).filter(function(s){return s.id;});
     byId={}; SEATS.forEach(function(s){ byId[s.id]=s; });
     render();
   })
   .catch(function(e){
     document.getElementById('chart').innerHTML="<p class='loading'>Couldn't load cards ("+esc(e.message)+"). This view reads /seats live via the GitHub API — if rate-limited, wait a minute and reload.</p>";
   });
}
load();
</script>
</body>
</html>
